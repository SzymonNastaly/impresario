name: impresario-studio
icon: null
processes:
  pnpm:test:
    command: pnpm run test
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  pnpm:build:
    command: pnpm run build
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  pnpm:dev:
    command: pnpm run dev
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
  pnpm:start:
    command: pnpm run start
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
