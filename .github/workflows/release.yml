name: Release

# Builds Windows, Linux and macOS artifacts natively (one runner per OS so
# better-sqlite3 compiles correctly) and attaches them to a GitHub Release.
#
# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.1 && git push origin v1.0.1

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for testing the pipeline without creating a tag/release.
  workflow_dispatch:

permissions:
  contents: write # needed to create/update the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            ebargs: --mac
          - os: windows-latest
            platform: win
            ebargs: --win
          - os: ubuntu-latest
            platform: linux
            # snap is omitted on purpose: it needs snapcraft+lxd in CI.
            ebargs: --linux AppImage deb
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- macOS only: materialise the App Store Connect API key (.p8) ---
      # The .p8 is stored base64-encoded in the APPLE_API_KEY_BASE64 secret;
      # we decode it back to a file and point APPLE_API_KEY at that path.
      - name: Prepare Apple API key
        if: matrix.platform == 'mac'
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey.p8
          echo "APPLE_API_KEY=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: Build and package
        run: |
          pnpm run build
          pnpm exec electron-builder ${{ matrix.ebargs }} --publish never
        env:
          # GitHub provides this token automatically; used by the release step.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (Developer ID cert exported as base64 .p12)
          # and notarization. Scoped to the mac job: an empty string is treated
          # as "unset" by electron-builder, so the Windows job does NOT try to
          # sign the .exe with the macOS certificate.
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_API_KEY_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.platform == 'mac' && secrets.APPLE_API_ISSUER || '' }}

      # Always available for inspection (incl. manual workflow_dispatch runs).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

      - name: Upload to GitHub Release
        # Only when triggered by a version tag, never on a manual test run.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Running from each matrix job appends that OS's files to the same
          # release for the pushed tag.
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
